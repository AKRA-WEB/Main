<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKRA Portal | Main Dashboard</title>
    <!-- ใช้ Tailwind CSS สำหรับความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ใช้ Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ฟอนต์ Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* แอนิเมชันตอนโหลดเข้าหน้า */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- 1. หน้า Login -->
    <div id="loginSection" class="w-full max-w-md fade-in">
        <div class="glass-card rounded-2xl p-8 shadow-2xl text-center">
            <div class="bg-blue-600/20 p-4 rounded-full inline-block mb-4">
                <i data-lucide="shield-check" class="w-12 h-12 text-blue-400"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">AKRA-TRD WEB</h1>
            <p class="text-slate-400 mb-8">ลงชื่อเข้าใช้ระบบส่วนกลาง (SSO)</p>

            <form id="loginForm" class="space-y-4">
                <div>
                    <input type="password" id="passwordInput" placeholder="กรอกรหัสผ่านเพื่อเข้าใช้งาน" 
                        class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 text-center text-lg tracking-widest text-white transition-colors"
                        required>
                </div>
                <button type="submit" id="loginBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center">
                    <span>เข้าสู่ระบบ</span>
                </button>
                <p id="errorMsg" class="text-red-400 text-sm hidden mt-2">รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่</p>
            </form>
        </div>
    </div>

    <!-- 2. หน้า Dashboard (แสดงหลัง Login ผ่าน) -->
    <div id="dashboardSection" class="w-full max-w-5xl hidden fade-in">
        
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-center mb-10 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-lg">
            <div>
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="text-blue-400"></i>
                    ระบบปฏิบัติการ AKRA-TRD
                </h2>
                <p class="text-slate-400 text-sm mt-1">เลือกระบบที่คุณต้องการใช้งาน</p>
            </div>
            <div class="flex items-center gap-4 mt-4 sm:mt-0 bg-slate-900/50 py-2 px-4 rounded-xl border border-slate-700">
                <div class="text-right">
                    <p class="text-xs text-slate-400">ผู้ใช้งานระบบ</p>
                    <p id="userNameDisplay" class="font-semibold text-blue-400 text-lg">User</p>
                </div>
                <div class="h-10 w-10 bg-slate-700 rounded-full flex items-center justify-center text-xl font-bold border-2 border-slate-600 text-white">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </div>
                <div class="w-px h-8 bg-slate-700 mx-2"></div>
                <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all" title="ออกจากระบบ">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- App Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- App 1: เบิกสินค้า W5 (AKRA) -->
            <!-- ⚠️ สำคัญ: เปลี่ยน URL เป็นลิงก์เว็บจริงของคุณ (เช่น GitHub Pages) -->
            <button onclick="openApp('เบิกสินค้า W5', 'https://akra-web.github.io/AKRA/')" 
                class="glass-card p-6 rounded-xl hover:bg-slate-800 hover:border-indigo-500 transition-all transform hover:-translate-y-1 text-left group flex flex-col h-full cursor-pointer shadow-lg hover:shadow-indigo-500/20">
                <div class="bg-indigo-500/20 w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:bg-indigo-500/40 transition-colors">
                    <i data-lucide="package-minus" class="text-indigo-400 w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold mb-2 group-hover:text-indigo-300 transition-colors">1. เบิกสินค้า W5</h3>
                <p class="text-sm text-slate-400 flex-grow">ระบบจัดการเบิกจ่ายสินค้า W5</p>
                <div class="mt-4 flex items-center text-xs text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span>เปิดระบบ</span> <i data-lucide="external-link" class="w-3 h-3 ml-1"></i>
                </div>
            </button>

            <!-- App 2: เบิกย้ายสินค้า AKRA > TRD -->
            <button onclick="openApp('เบิกย้ายสินค้า AKRA > TRD', 'https://akra-web.github.io/TRDAKRA/')" 
                class="glass-card p-6 rounded-xl hover:bg-slate-800 hover:border-emerald-500 transition-all transform hover:-translate-y-1 text-left group flex flex-col h-full cursor-pointer shadow-lg hover:shadow-emerald-500/20">
                <div class="bg-emerald-500/20 w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:bg-emerald-500/40 transition-colors">
                    <i data-lucide="arrow-right-left" class="text-emerald-400 w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold mb-2 group-hover:text-emerald-300 transition-colors">2. เบิกย้ายสินค้า</h3>
                <p class="text-sm text-slate-400 flex-grow">โอนย้ายสินค้าระหว่างคลัง AKRA ไปยัง TRD</p>
                <div class="mt-4 flex items-center text-xs text-emerald-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span>เปิดระบบ</span> <i data-lucide="external-link" class="w-3 h-3 ml-1"></i>
                </div>
            </button>

            <!-- App 3: KPITrackerAKRA -->
            <button onclick="openApp('KPITrackerAKRA', 'https://akra-web.github.io/KPITRACKER/')" 
                class="glass-card p-6 rounded-xl hover:bg-slate-800 hover:border-amber-500 transition-all transform hover:-translate-y-1 text-left group flex flex-col h-full cursor-pointer shadow-lg hover:shadow-amber-500/20">
                <div class="bg-amber-500/20 w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:bg-amber-500/40 transition-colors">
                    <i data-lucide="bar-chart-2" class="text-amber-400 w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold mb-2 group-hover:text-amber-300 transition-colors">3. KPI Tracker</h3>
                <p class="text-sm text-slate-400 flex-grow">ระบบติดตามและประเมินผลตัวชี้วัดการทำงาน</p>
                <div class="mt-4 flex items-center text-xs text-amber-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span>เปิดระบบ</span> <i data-lucide="external-link" class="w-3 h-3 ml-1"></i>
                </div>
            </button>

            <!-- App 4: รับลงสินค้า (PO) -->
            <button onclick="openApp('รับลงสินค้า', 'https://akra-web.github.io/PO/')" 
                class="glass-card p-6 rounded-xl hover:bg-slate-800 hover:border-rose-500 transition-all transform hover:-translate-y-1 text-left group flex flex-col h-full cursor-pointer shadow-lg hover:shadow-rose-500/20">
                <div class="bg-rose-500/20 w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:bg-rose-500/40 transition-colors">
                    <i data-lucide="clipboard-list" class="text-rose-400 w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold mb-2 group-hover:text-rose-300 transition-colors">4. รับลงสินค้า</h3>
                <p class="text-sm text-slate-400 flex-grow">ระบบจัดการใบสั่งซื้อ (PO) และการรับเข้าสินค้า</p>
                <div class="mt-4 flex items-center text-xs text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span>เปิดระบบ</span> <i data-lucide="external-link" class="w-3 h-3 ml-1"></i>
                </div>
            </button>

            <!-- App 5: แจ้งสินค้าเสียหาย -->
            <button onclick="openApp('แจ้งสินค้าเสียหาย', 'https://akra-web.github.io/DamageReport/')" 
                class="glass-card p-6 rounded-xl hover:bg-slate-800 hover:border-violet-500 transition-all transform hover:-translate-y-1 text-left group flex flex-col h-full cursor-pointer shadow-lg hover:shadow-violet-500/20">
                <div class="bg-violet-500/20 w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:bg-violet-500/40 transition-colors">
                    <i data-lucide="package-x" class="text-violet-400 w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold mb-2 group-hover:text-violet-300 transition-colors">5. แจ้งสินค้าเสียหาย</h3>
                <p class="text-sm text-slate-400 flex-grow">ระบบแจ้งและจัดการสินค้าที่ชำรุดหรือเสียหาย</p>
                <div class="mt-4 flex items-center text-xs text-violet-400 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span>เปิดระบบ</span> <i data-lucide="external-link" class="w-3 h-3 ml-1"></i>
                </div>
            </button>

        </div>
        
        <div class="mt-12 text-center text-slate-500 text-sm">
            &copy; 2026 AKRA WEB SYSTEM
        </div>
    </div>

    <!-- ส่วนของการทำงาน JavaScript -->
    <script>
        // เริ่มต้นการใช้งานไอคอน
        lucide.createIcons();

        // **ตั้งค่า URL ของเว็บแอป (Apps Script) ที่นี่**
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5PCJ1OlxCQR6zaNubrmZTgaORB-rJK2Ow5_YC3i5kKv-BrrTgJkTJyNZKrzfodK1m/exec"; 

        // ฐานข้อมูลผู้ใช้ตามที่คุณระบุ
        const users = {
            "250013": "Chen",
            "250002": "TOP",
            "250028": "SAN",
            "250007": "YONG",
            "250021": "MAI",
            "250022": "BUNLENG",
            "250025": "PUSH",
            "250027": "JAME",
            "250010": "ENG"
        };

        let currentUser = null;

        // เช็คว่าเคย Login ไว้หรือยัง (จำค่าไว้ใน Browser)
        window.onload = () => {
            const savedUser = localStorage.getItem('akra_sso_user');
            if (savedUser) {
                currentUser = savedUser;
                showDashboard();
            }
        };

        // จัดการฟอร์ม Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (users[pwd]) {
                currentUser = users[pwd];
                errorMsg.classList.add('hidden');
                
                // เปลี่ยนสถานะปุ่มตอนโหลด
                const originalBtnContent = loginBtn.innerHTML;
                loginBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin mr-2"></i> กำลังเข้าสู่ระบบ...';
                lucide.createIcons();

                // บันทึกลง localStorage เพื่อทำ SSO (จำค่าไว้ไม่ต้องกรอกใหม่)
                localStorage.setItem('akra_sso_user', currentUser);

                // ส่ง Log การเข้าสู่ระบบไปยัง Google Sheet (ไม่รอให้เสร็จก็ให้เข้าหน้าแดชบอร์ดเลยเพื่อความรวดเร็ว)
                sendLog("Login", "Portal", "เข้าสู่ระบบหน้าหลัก");

                showDashboard();
            } else {
                errorMsg.classList.remove('hidden');
            }
        });

        // ฟังก์ชันแสดงหน้า Dashboard
        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('userNameDisplay').textContent = currentUser;
            document.getElementById('passwordInput').value = ''; // เคลียร์รหัส
            document.getElementById('loginBtn').innerHTML = '<span>เข้าสู่ระบบ</span>'; // คืนค่าปุ่ม
        }

        // ฟังก์ชันออกจากระบบ
        function logout() {
            sendLog("Logout", "Portal", "ออกจากระบบ");
            localStorage.removeItem('akra_sso_user');
            currentUser = null;
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        // ฟังก์ชันเปิด App ในแท็บใหม่
        function openApp(appName, targetUrl) {
            // 1. ส่ง Log ไปบันทึก
            sendLog("Open App", appName, `เข้าสู่แอปพลิเคชัน`);

            // 2. สร้าง URL พร้อมแนบพารามิเตอร์ SSO ไปด้วย
            try {
                const urlWithSSO = new URL(targetUrl);
                // แนบชื่อผู้ใช้ไปกับ URL เช่น ?user=Chen
                urlWithSSO.searchParams.set('user', currentUser);
                // แนบ Token หลอกๆ หรือ Timestamp เพื่อให้รู้ว่าเป็น Session ปัจจุบัน
                urlWithSSO.searchParams.set('session', new Date().getTime()); 

                // 3. เปิดแท็บใหม่
                window.open(urlWithSSO.toString(), '_blank'); 
            } catch (e) {
                console.error("URL ไม่ถูกต้อง:", targetUrl);
                alert("เกิดข้อผิดพลาด: ไม่สามารถเปิดลิงก์ได้ กรุณาตรวจสอบ URL ของแอป");
            }
        }

        // ฟังก์ชันสำหรับส่งข้อมูลไปบันทึกลง Google Sheet แบบ Asynchronous (ไม่หน่วงหน้าเว็บ)
        function sendLog(action, app, details) {
            if (!GOOGLE_APP_SCRIPT_URL || GOOGLE_APP_SCRIPT_URL === "ใส่_URL_WEB_APP_ของคุณที่นี่") {
                console.warn("ยังไม่ได้ตั้งค่า URL สำหรับส่ง Log");
                return;
            }

            const payload = {
                user: currentUser || "Unknown",
                action: action,
                app: app,
                details: details
            };

            // ใช้ fetch ส่งข้อมูลแบบ 'no-cors' เพื่อไม่ให้ติดปัญหาข้ามโดเมน
            fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log(`Log sent: ${action} - ${app}`);
            }).catch(error => {
                console.error('Log error:', error);
            });
        }
    </script>
</body>
</html>
