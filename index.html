<script>
        /** =========================================================
         * 1. CONFIGURATION & DATA
         * ========================================================== */
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbxSomEq-O49vgID_6P-3XfoGuM86rM0dWPQS-ZMsFDvF-_N-O3EkaOS1Cdgg8nkxNfe/exec",
            STORAGE_USER_DB: "akra_users_db",
            STORAGE_SESSION: "akra_session",
            STORAGE_APP_CONFIG: "akra_app_config"
        };

        const DEFAULT_APP_CONFIG = [
            { id: "app-w5", name: "เบิก W5", icon: "package-minus", url: "https://akra-web.github.io/AKRA/", roles: ["ADMIN", "AKRA", "WAREHOUSE"] },
            { id: "app-trd", name: "ย้ายสินค้า", icon: "arrow-right-left", url: "https://akra-web.github.io/TRDAKRA/", roles: ["ADMIN", "AKRA", "TRD", "WAREHOUSE"] },
            { id: "app-po", name: "รับสินค้า", icon: "clipboard-list", url: "https://akra-web.github.io/PO/", roles: ["ADMIN", "AKRA", "WAREHOUSE"] },
            { id: "app-pr", name: "PR ขอซื้อ", icon: "file-plus-2", url: "https://akra-web.github.io/PR/", roles: ["ADMIN", "AKRA", "WAREHOUSE"] },
            { id: "app-tracking", name: "Track PO", icon: "truck", url: "https://akra-web.github.io/TrackingPO/", roles: ["ADMIN", "AKRA", "TRD", "WAREHOUSE"] },
            { id: "app-damage", name: "ของคืน/เคลม", icon: "package-x", url: "https://akra-web.github.io/Returnitem/", roles: ["ADMIN", "AKRA", "TRD", "WAREHOUSE", "Cashier"] },
            { id: "app-kpi", name: "KPI Tracker", icon: "bar-chart-2", url: "https://akra-web.github.io/KPITRACKER/", roles: ["ADMIN", "AKRA", "TRD", "WAREHOUSE", "Cashier"] },
            { id: "app-manual", name: "คู่มือ", icon: "book-open", url: "https://akra-web.github.io/SOP/", roles: ["ADMIN", "AKRA", "TRD", "WAREHOUSE", "Cashier"] }
        ];

        const AVAILABLE_ROLES = [
            { val: "ADMIN", label: "ADMIN", desc: "ผู้ดูแลระบบ", icon: "shield-alert" },
            { val: "AKRA", label: "AKRA", desc: "พนักงาน AKRA", icon: "building-2" },
            { val: "TRD", label: "TRD", desc: "พนักงาน TRD", icon: "store" },
            { val: "WAREHOUSE", label: "WAREHOUSE", desc: "คลังสินค้า", icon: "warehouse" },
            { val: "Cashier", label: "Cashier", desc: "แคชเชียร์/การเงิน", icon: "calculator" }
        ];

        let state = {
            users: {},
            currentUser: null,
            currentRoles: [],
            appConfig: [] 
        };

        /** =========================================================
         * 2. UI SERVICES & API
         * ========================================================== */
        const UI = {
            showToast: (message, type = 'success') => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                let config = { bg: 'bg-[#171C8F]', icon: 'check-circle' };
                if (type === 'error') config = { bg: 'bg-red-500', icon: 'x-circle' };
                if (type === 'warning') config = { bg: 'bg-[#E35205]', icon: 'alert-triangle' };

                toast.className = `flex items-center gap-3 ${config.bg} text-white px-5 py-3 rounded-xl shadow-xl toast-slide-in min-w-[250px] font-medium text-sm`;
                toast.innerHTML = `<i data-lucide="${config.icon}" class="w-5 h-5"></i> <span>${message}</span>`;
                container.appendChild(toast);
                lucide.createIcons();
                setTimeout(() => {
                    toast.classList.replace('toast-slide-in', 'toast-fade-out');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },
            switchSection: (sectionId) => {
                ['login-section', 'dashboard-section', 'admin-section'].forEach(sec => {
                    document.getElementById(sec).classList.toggle('hidden', sec !== sectionId);
                });
                if(sectionId === 'admin-section') AdminInteractive.init();
            }
        };

        const API = {
            fetchData: async () => {
                try {
                    const response = await fetch(`${CONFIG.API_URL}?action=getUsers`);
                    if (!response.ok) throw new Error("HTTP Error");
                    const data = await response.json();
                    
                    if (data.users && Object.keys(data.users).length > 0) {
                        state.users = data.users;
                        localStorage.setItem(CONFIG.STORAGE_USER_DB, JSON.stringify(data.users));
                        
                        // ดึง AppConfig จาก Sheet ถ้ามี ถ้าไม่มีใช้ Default
                        if (data.appConfig && data.appConfig.length > 0) {
                            state.appConfig = data.appConfig;
                        } else {
                            state.appConfig = JSON.parse(JSON.stringify(DEFAULT_APP_CONFIG));
                        }
                        localStorage.setItem(CONFIG.STORAGE_APP_CONFIG, JSON.stringify(state.appConfig));
                        return true;
                    }
                } catch (error) {
                    console.warn("ดึงข้อมูลจาก Server ไม่สำเร็จ ใช้ Cache แทน");
                    const cachedUsers = localStorage.getItem(CONFIG.STORAGE_USER_DB);
                    if (cachedUsers) state.users = JSON.parse(cachedUsers);
                    
                    const cachedApps = localStorage.getItem(CONFIG.STORAGE_APP_CONFIG);
                    state.appConfig = cachedApps ? JSON.parse(cachedApps) : JSON.parse(JSON.stringify(DEFAULT_APP_CONFIG));
                    throw error;
                }
            },
            postAction: async (payload) => {
                await fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            },
            sendLog: (action, appName, details) => {
                if(!state.currentUser) return;
                fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ action, app: appName, details, user: state.currentUser }) }).catch(()=>{});
            }
        };

        /** =========================================================
         * 3. ADMIN INTERACTIVE MANAGER
         * ========================================================== */
        const AdminInteractive = {
            editingUserId: null,
            editingRoles: [],

            init: () => {
                AdminInteractive.renderUserList();
                AdminInteractive.setupAppPreviewGrid();
                AdminInteractive.renderAppMatrix();
                
                document.getElementById('search-input').addEventListener('input', AdminInteractive.renderUserList);
                document.getElementById('interactive-form').addEventListener('submit', AdminInteractive.handleSave);
                document.getElementById('btn-delete-user').addEventListener('click', AdminInteractive.handleDelete);
                
                document.getElementById('interactive-form').classList.add('hidden');
                document.getElementById('empty-selection-state').classList.remove('hidden');
            },

            switchTab: (tabName) => {
                const isUsers = tabName === 'users';
                document.getElementById('tab-content-users').classList.toggle('hidden', !isUsers);
                document.getElementById('tab-content-apps').classList.toggle('hidden', isUsers);
                
                const btnUsers = document.getElementById('tab-btn-users');
                const btnApps = document.getElementById('tab-btn-apps');

                if (isUsers) {
                    btnUsers.className = "px-5 py-2 rounded-lg font-bold bg-white text-brand-blue shadow-sm transition-all flex items-center gap-2";
                    btnApps.className = "px-5 py-2 rounded-lg font-medium text-slate-500 hover:text-brand-blue transition-all flex items-center gap-2";
                } else {
                    btnApps.className = "px-5 py-2 rounded-lg font-bold bg-white text-brand-blue shadow-sm transition-all flex items-center gap-2";
                    btnUsers.className = "px-5 py-2 rounded-lg font-medium text-slate-500 hover:text-brand-blue transition-all flex items-center gap-2";
                }
            },

            renderUserList: () => {
                const listEl = document.getElementById('interactive-user-list');
                const search = document.getElementById('search-input').value.toLowerCase().trim();
                listEl.innerHTML = '';
                let count = 0;

                for (const [id, data] of Object.entries(state.users)) {
                    if (search && !id.toLowerCase().includes(search) && !data.name.toLowerCase().includes(search)) continue;
                    count++;
                    
                    const roles = Array.isArray(data.roles) ? data.roles : [];
                    const shortRoles = roles.slice(0, 2).join(', ') + (roles.length > 2 ? '...' : '');
                    
                    const div = document.createElement('div');
                    div.className = `p-3 rounded-xl cursor-pointer transition-all border border-transparent hover:bg-white hover:border-slate-200 hover:shadow-sm flex items-center gap-3 ${AdminInteractive.editingUserId === id ? 'bg-white border-brand-orange/50 shadow-md ring-1 ring-brand-orange/20' : ''}`;
                    div.onclick = () => AdminInteractive.selectUser(id);
                    
                    div.innerHTML = `
                        <div class="w-10 h-10 rounded-full bg-brand-blue/10 text-brand-blue flex items-center justify-center font-bold text-sm shrink-0 border border-brand-blue/20">
                            ${data.name.substring(0, 1).toUpperCase()}
                        </div>
                        <div class="flex-grow min-w-0">
                            <p class="font-bold text-slate-800 truncate leading-tight">${data.name}</p>
                            <p class="text-xs font-mono text-slate-500">${id}</p>
                        </div>
                        <div class="shrink-0 text-right">
                            <span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md font-medium">${shortRoles || 'No Role'}</span>
                        </div>
                    `;
                    listEl.appendChild(div);
                }

                if(count === 0) listEl.innerHTML = `<div class="p-6 text-center text-slate-400 text-sm"><i data-lucide="user-x" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>ไม่พบชื่อนี้</div>`;
                document.getElementById('user-count').innerText = count;
                lucide.createIcons();
            },

            selectUser: (id) => {
                const data = state.users[id];
                if(!data) return;

                document.getElementById('empty-selection-state').classList.add('hidden');
                document.getElementById('interactive-form').classList.remove('hidden');
                document.getElementById('btn-delete-user').classList.remove('hidden');
                document.getElementById('role-error-msg').classList.add('hidden');

                AdminInteractive.editingUserId = id;
                AdminInteractive.editingRoles = Array.isArray(data.roles) ? [...data.roles] : [];

                const idInput = document.getElementById('editor-id');
                idInput.value = id; idInput.readOnly = true;
                
                document.getElementById('editor-name').value = data.name;
                document.getElementById('editor-avatar').innerText = data.name.substring(0,1).toUpperCase();

                AdminInteractive.renderUserList();
                AdminInteractive.renderRoleGrid();
                AdminInteractive.updateAppPreview();
            },

            setupNewUser: () => {
                document.getElementById('empty-selection-state').classList.add('hidden');
                document.getElementById('interactive-form').classList.remove('hidden');
                document.getElementById('btn-delete-user').classList.add('hidden'); 
                document.getElementById('role-error-msg').classList.add('hidden');

                AdminInteractive.editingUserId = null; 
                AdminInteractive.editingRoles = []; 

                const idInput = document.getElementById('editor-id');
                idInput.value = ''; idInput.readOnly = false; idInput.focus();

                document.getElementById('editor-name').value = '';
                document.getElementById('editor-avatar').innerHTML = '<i data-lucide="user-plus" class="w-6 h-6"></i>';

                AdminInteractive.renderUserList(); 
                AdminInteractive.renderRoleGrid();
                AdminInteractive.updateAppPreview();
                lucide.createIcons();
            },

            renderRoleGrid: () => {
                const grid = document.getElementById('interactive-role-grid');
                grid.innerHTML = '';

                AVAILABLE_ROLES.forEach(r => {
                    const isActive = AdminInteractive.editingRoles.includes(r.val);
                    const div = document.createElement('div');
                    
                    div.className = `role-card cursor-pointer border-2 rounded-2xl p-4 flex flex-col items-center justify-center text-center transition-all duration-200 group relative overflow-hidden h-32 ${isActive ? 'active border-brand-orange bg-[#fffaf5]' : 'border-slate-200 hover:border-slate-300 bg-white'}`;
                    div.onclick = () => AdminInteractive.toggleRole(r.val);
                    
                    const iconBg = isActive ? 'bg-brand-orange text-white' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200';
                    const checkMark = isActive ? `<div class="absolute top-2 right-2 text-brand-orange bg-white rounded-full p-0.5 shadow-sm"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div>` : '';

                    div.innerHTML = `
                        ${checkMark}
                        <div class="icon-bg w-10 h-10 rounded-full flex items-center justify-center mb-2 transition-colors ${iconBg}">
                            <i data-lucide="${r.icon}" class="w-5 h-5"></i>
                        </div>
                        <h4 class="font-bold text-sm text-slate-800">${r.label}</h4>
                        <p class="text-[10px] text-slate-500 leading-tight mt-1 px-1">${r.desc}</p>
                    `;
                    grid.appendChild(div);
                });
                lucide.createIcons();
            },

            toggleRole: (roleVal) => {
                const idx = AdminInteractive.editingRoles.indexOf(roleVal);
                if (idx === -1) AdminInteractive.editingRoles.push(roleVal);
                else AdminInteractive.editingRoles.splice(idx, 1);
                
                document.getElementById('role-error-msg').classList.add('hidden');
                AdminInteractive.renderRoleGrid();
                AdminInteractive.updateAppPreview(); 
            },

            setupAppPreviewGrid: () => {
                const grid = document.getElementById('interactive-app-preview');
                grid.innerHTML = '';
                state.appConfig.forEach(app => {
                    grid.innerHTML += `
                        <div id="preview-app-${app.id}" class="app-preview-card border-2 border-slate-200 bg-white rounded-xl p-2 flex flex-col items-center justify-center text-center">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mb-1 transition-colors">
                                <i data-lucide="${app.icon}" class="w-4 h-4"></i>
                            </div>
                            <span class="text-[9px] font-bold leading-tight line-clamp-2">${app.name}</span>
                        </div>
                    `;
                });
            },

            updateAppPreview: () => {
                state.appConfig.forEach(app => {
                    const el = document.getElementById(`preview-app-${app.id}`);
                    if (!el) return;
                    
                    const isUnlocked = app.roles.some(role => AdminInteractive.editingRoles.includes(role));
                    const iconDiv = el.querySelector('div'); 
                    
                    if (isUnlocked) {
                        el.classList.add('unlocked');
                        iconDiv.className = "w-8 h-8 rounded-lg bg-brand-blue/10 text-brand-blue flex items-center justify-center mb-1 transition-colors";
                    } else {
                        el.classList.remove('unlocked');
                        iconDiv.className = "w-8 h-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center mb-1 transition-colors";
                    }
                });
            },

            handleSave: async (e) => {
                e.preventDefault();
                const idInput = document.getElementById('editor-id').value.trim();
                const nameInput = document.getElementById('editor-name').value.trim().toUpperCase();
                
                if (!idInput || !nameInput) { UI.showToast("กรุณากรอกรหัสและชื่อพนักงาน", "warning"); return; }
                if (AdminInteractive.editingRoles.length === 0) { document.getElementById('role-error-msg').classList.remove('hidden'); return; }

                const btn = document.getElementById('btn-save-user');
                const btnText = document.getElementById('save-btn-text');
                btn.disabled = true; btnText.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline"></i> กำลังบันทึก...';

                try {
                    const payload = { action: "saveUser", id: idInput, name: nameInput, roles: AdminInteractive.editingRoles };
                    state.users[idInput] = { name: nameInput, roles: [...AdminInteractive.editingRoles] };
                    localStorage.setItem(CONFIG.STORAGE_USER_DB, JSON.stringify(state.users));
                    
                    await API.postAction(payload);
                    API.sendLog("Admin Action", "Portal", `จัดการสิทธิ์: ${idInput} (${nameInput})`);
                    UI.showToast("อัปเดตสิทธิ์สำเร็จ", "success");
                    
                    if(nameInput === state.currentUser) {
                        state.currentRoles = [...AdminInteractive.editingRoles];
                        localStorage.setItem(CONFIG.STORAGE_SESSION, JSON.stringify({ name: nameInput, roles: state.currentRoles }));
                    }

                    AdminInteractive.editingUserId = idInput; 
                    document.getElementById('editor-id').readOnly = true;
                    document.getElementById('btn-delete-user').classList.remove('hidden');
                    AdminInteractive.renderUserList();

                } catch (err) { UI.showToast("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง", "error"); } 
                finally { btn.disabled = false; btnText.innerText = 'บันทึกข้อมูล'; }
            },

            handleDelete: async () => {
                const id = AdminInteractive.editingUserId;
                if(!id) return;
                const name = state.users[id].name;

                if (name === state.currentUser) { UI.showToast("ไม่อนุญาตให้ลบบัญชีที่กำลังใช้งานอยู่", "warning"); return; }

                if(confirm(`ยืนยันการลบ ${name} (${id}) ถาวรหรือไม่?`)) {
                    try {
                        delete state.users[id];
                        localStorage.setItem(CONFIG.STORAGE_USER_DB, JSON.stringify(state.users));
                        await API.postAction({ action: "deleteUser", id });
                        
                        UI.showToast("ลบผู้ใช้สำเร็จ", "success");
                        AdminInteractive.setupNewUser();
                        document.getElementById('empty-selection-state').classList.remove('hidden');
                        document.getElementById('interactive-form').classList.add('hidden');
                    } catch(e) { UI.showToast("ลบไม่สำเร็จ", "error"); }
                }
            },

            // --- TAB 2: App Role Matrix Logic ---
            renderAppMatrix: () => {
                const tbody = document.getElementById('app-permission-matrix');
                const headerRow = document.getElementById('app-matrix-header-row');

                if (headerRow.children.length === 1) {
                    AVAILABLE_ROLES.forEach(r => {
                        const th = document.createElement('th');
                        th.className = "p-4 font-bold text-slate-700 bg-slate-100 text-center border-l border-slate-200 min-w-[100px]";
                        th.innerHTML = `<i data-lucide="${r.icon}" class="w-4 h-4 mx-auto mb-1 text-brand-orange"></i>${r.label}`;
                        headerRow.appendChild(th);
                    });
                }

                tbody.innerHTML = '';
                state.appConfig.forEach(app => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-brand-blue/5 transition-colors";

                    let roleCells = '';
                    AVAILABLE_ROLES.forEach(r => {
                        const hasRole = app.roles.includes(r.val);
                        const isAdminCol = r.val === 'ADMIN';
                        const checkedAttr = hasRole ? 'checked' : '';
                        const disabledAttr = isAdminCol ? 'disabled' : '';
                        const cursorClass = isAdminCol ? 'cursor-not-allowed opacity-50' : 'cursor-pointer';

                        roleCells += `
                            <td class="p-4 text-center border-l border-slate-100 align-middle">
                                <label class="inline-flex items-center ${cursorClass}">
                                    <input type="checkbox" class="sr-only peer" ${checkedAttr} ${disabledAttr} 
                                           onchange="AdminInteractive.toggleMatrixRole('${app.id}', '${r.val}')">
                                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-blue relative"></div>
                                </label>
                            </td>
                        `;
                    });

                    tr.innerHTML = `
                        <td class="p-4 font-medium text-slate-800 border-r border-slate-200 bg-white">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center shrink-0">
                                    <i data-lucide="${app.icon}" class="w-4 h-4"></i>
                                </div>
                                <span>${app.name}</span>
                            </div>
                        </td>
                        ${roleCells}
                    `;
                    tbody.appendChild(tr);
                });
                lucide.createIcons();
            },

            toggleMatrixRole: (appId, roleVal) => {
                const app = state.appConfig.find(a => a.id === appId);
                if(!app) return;

                const roleIdx = app.roles.indexOf(roleVal);
                if (roleIdx > -1) {
                    app.roles.splice(roleIdx, 1);
                } else {
                    app.roles.push(roleVal);
                }
            },

            // ✨ ส่วนนี้คือสิ่งที่อัปเดตใหม่ ให้ยิง API ไปเซฟที่ Google Sheets
            saveAppConfig: async () => {
                const btn = document.querySelector('[onclick="AdminInteractive.saveAppConfig()"]');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> กำลังบันทึกไปยังฐานข้อมูล...';
                btn.disabled = true;
                lucide.createIcons();

                try {
                    // 1. อัปเดตในเครื่อง
                    localStorage.setItem(CONFIG.STORAGE_APP_CONFIG, JSON.stringify(state.appConfig));
                    
                    // 2. ส่งข้อมูลไปเซฟที่ Google Sheets
                    await API.postAction({
                        action: "saveAppConfig",
                        appConfig: state.appConfig
                    });

                    UI.showToast("บันทึกตารางสิทธิ์ลงฐานข้อมูลสำเร็จ", "success");
                    
                    AdminInteractive.setupAppPreviewGrid();
                    if(AdminInteractive.editingUserId) {
                        AdminInteractive.updateAppPreview();
                    }
                    API.sendLog("Admin Action", "Portal", "ปรับปรุงตารางสิทธิ์การเข้าแอปบน Database");
                    
                } catch (error) {
                    UI.showToast("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์", "error");
                } finally {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            }
        };

        /** =========================================================
         * 4. MAIN APP INITIALIZATION
         * ========================================================== */
        const App = {
            init: async () => {
                lucide.createIcons();
                
                document.getElementById('login-form').addEventListener('submit', App.handleLogin);
                document.getElementById('logout-btn').addEventListener('click', App.handleLogout);
                document.getElementById('admin-btn').addEventListener('click', () => UI.switchSection('admin-section'));
                document.getElementById('back-to-dash-btn').addEventListener('click', () => {
                    UI.switchSection('dashboard-section');
                    App.renderDashboard(); // รีเฟรชหน้าหลักเผื่อมีการเปลี่ยนสิทธิ์
                });
                document.getElementById('refresh-data-btn').addEventListener('click', async () => {
                    document.getElementById('refresh-icon').classList.add('animate-spin');
                    try {
                        await API.fetchData();
                        AdminInteractive.renderUserList();
                        AdminInteractive.renderAppMatrix(); // อัปเดตตารางสิทธิ์ด้วย
                        UI.showToast("ดึงข้อมูลล่าสุดจากเซิร์ฟเวอร์แล้ว");
                    } catch(e) {}
                    setTimeout(()=>document.getElementById('refresh-icon').classList.remove('animate-spin'), 500);
                });

                const session = localStorage.getItem(CONFIG.STORAGE_SESSION);
                if (session) {
                    try {
                        const parsed = JSON.parse(session);
                        state.currentUser = parsed.name;
                        state.currentRoles = parsed.roles || [];
                        UI.switchSection('dashboard-section');
                    } catch (e) { localStorage.removeItem(CONFIG.STORAGE_SESSION); }
                }

                try { 
                    await API.fetchData(); 
                    if(state.currentUser) App.renderDashboard();
                } 
                catch (error) { 
                    if(Object.keys(state.users).length === 0) {
                         state.users = {"250013": { name: "CHEN", roles: ["ADMIN"] }, "Stamp111": { name: "STAMP", roles: ["WAREHOUSE", "Cashier"] }};
                    }
                }
            },

            handleLogin: async (e) => {
                e.preventDefault();
                const pwdInput = document.getElementById('password-input');
                const pwd = pwdInput.value.trim();

                if (!pwd) return;

                const btn = document.getElementById('login-btn');
                const btnText = document.getElementById('login-btn-text');
                btn.disabled = true; btnText.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2 inline"></i> ตรวจสอบ...'; lucide.createIcons();
                
                setTimeout(() => {
                    const user = state.users[pwd];
                    if (user) {
                        state.currentUser = user.name;
                        state.currentRoles = Array.isArray(user.roles) ? user.roles : [user.roles];
                        localStorage.setItem(CONFIG.STORAGE_SESSION, JSON.stringify({ name: state.currentUser, roles: state.currentRoles }));
                        pwdInput.value = '';
                        UI.showToast(`ยินดีต้อนรับ ${state.currentUser}`);
                        UI.switchSection('dashboard-section');
                        App.renderDashboard();
                    } else {
                        UI.showToast("รหัสไม่ถูกต้อง", 'error');
                        pwdInput.focus();
                    }
                    btn.disabled = false; btnText.innerText = 'เข้าสู่ระบบ';
                }, 500);
            },

            handleLogout: () => {
                localStorage.removeItem(CONFIG.STORAGE_SESSION);
                state.currentUser = null; state.currentRoles = [];
                UI.switchSection('login-section');
            },

            renderDashboard: () => {
                const badges = state.currentRoles.map(r => `<span class="inline-block bg-brand-blue/10 text-brand-blue text-[10px] font-bold px-2 py-0.5 rounded ml-1 border border-brand-blue/20">${r}</span>`).join('');
                document.getElementById('user-name-display').innerHTML = `${state.currentUser} ${badges}`;

                const adminBtn = document.getElementById('admin-btn');
                state.currentRoles.includes("ADMIN") ? adminBtn.classList.remove('hidden') : adminBtn.classList.add('hidden');

                const grid = document.getElementById('app-grid');
                grid.innerHTML = ''; 
                const allowedApps = state.appConfig.filter(app => app.roles.some(role => state.currentRoles.includes(role)));

                if (allowedApps.length === 0) {
                    grid.innerHTML = `<div class="col-span-full bg-white border border-slate-200 rounded-3xl p-12 text-center shadow-lg"><i data-lucide="lock" class="w-16 h-16 text-slate-200 mx-auto mb-4"></i><h3 class="text-xl font-bold text-slate-400">ไม่มีสิทธิ์ใช้งาน</h3></div>`;
                } else {
                    allowedApps.forEach(app => {
                        grid.innerHTML += `
                            <button onclick="window.open('${app.url}?user=${state.currentUser}&ts=${Date.now()}', '_blank')" 
                                class="bg-white p-6 rounded-2xl border-2 border-transparent hover:border-brand-orange transition-all transform hover:-translate-y-1 text-left group flex flex-col h-full shadow-lg hover:shadow-brand-orange/20">
                                <div class="bg-slate-50 w-12 h-12 rounded-xl flex items-center justify-center mb-4 group-hover:bg-brand-orange transition-colors border border-slate-100">
                                    <i data-lucide="${app.icon}" class="text-brand-blue group-hover:text-white w-6 h-6 transition-colors"></i>
                                </div>
                                <h3 class="text-lg font-bold mb-1 text-brand-blue group-hover:text-brand-orange transition-colors">${app.name}</h3>
                            </button>
                        `;
                    });
                }
                lucide.createIcons();
            }
        };

        document.addEventListener('DOMContentLoaded', App.init);
    </script>
